name: NTFSMac
options:
  bundleIdPrefix: com.ntfsmac
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  minimumXcodeGenVersion: "2.35"
  objectVersion: 56

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  NTFSMac:
    type: application
    platform: macOS
    sources:
      - path: NTFSMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ntfsmac.app
        INFOPLIST_FILE: NTFSMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: NTFSMac/NTFSMac.entitlements
        PRODUCT_NAME: "NTFS Mac"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
